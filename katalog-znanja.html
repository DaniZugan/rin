<!DOCTYPE html>
<html lang="sl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Katalog znanja – Računalništvo in informatika</title>
  <meta name="description" content="Pregleden katalog učnih ciljev po obdobjih, sklopih, podsklopih, razlagah in primerih." />
  <link rel="icon" type="image/png" href="assets/Slike/favicon.png" />
  <link rel="stylesheet" href="style.css?v=20260619a" />
</head>
<body>
<div id="site-header"></div>

<main id="top">
  <section id="katalog-znanja" class="catalog-section" data-knowledge-catalog>
    <div class="wrap">
      <div class="section-head catalog-page-head">
        <div class="catalog-title-row">
          <div>
            <p class="eyebrow">Katalog temeljnih vsebin in učnih ciljev računalništva in informatike za</p>
            <h2 id="catalogPageTitle">predšolsko obdobje</h2>
          </div>
          <img id="catalogPageLogo" class="catalog-page-logo" src="assets/Slike/logo-brin.png" alt="Logotip projekta B-RIN">
        </div>
        <div id="catalogPeriodTabs" class="catalog-period-tabs" aria-label="Izbira obdobja"></div>
      </div>

      <div class="catalog-layout">
        <aside class="catalog-sidebar" aria-label="Sklopi in podsklopi">
          <div id="catalogNav"></div>
        </aside>

        <section class="catalog-results" aria-live="polite">
          <div class="catalog-current">
            <p id="catalogCurrentSklop" class="eyebrow"></p>
            <h3 id="catalogCurrentPodsklop"></h3>
            <p id="catalogCurrentMeta" class="catalog-content-text"></p>
          </div>
          <div id="catalogGoals" class="goal-cards"></div>
        </section>
      </div>
    </div>
  </section>

</main>

<div id="site-footer"></div>

<script src="assets/Gradiva/katalog-znanja.js?v=20260617a"></script>
<script src="includes.js?v=20260610k"></script>
<script src="script.js?v=20260619a"></script>
</body>
</html>
